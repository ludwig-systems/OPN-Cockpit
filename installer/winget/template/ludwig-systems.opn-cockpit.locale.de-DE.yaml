ShortDescription: Multi-Site-Management fuer OPNsense-Firewalls per REST-API.
Description: |-
  OPN-Cockpit verwaltet bis zu 25 OPNsense-Firewalls aus einem Browser-Fenster
  heraus. Statische Routen und Aliase werden mit Plan-vor-Apply-Vorschau
  parallel auf 1..n Geraete ausgerollt und per Read-back gegen die OPNsense-
  API verifiziert. Audit-Log mit HMAC-Hash-Chain (Tamper-Evidence), Multi-
  User-Modus mit Rollen (viewer/operator/admin), verschluesselter Tresor
  (Argon2id + AES-256-GCM) fuer Geraete-Stammdaten und API-Credentials.
