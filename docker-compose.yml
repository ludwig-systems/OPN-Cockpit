# docker-compose fuer OPN-Cockpit.
#
# Start:    docker compose up -d
# Logs:     docker compose logs -f
# Stop:     docker compose down
# Update:   docker compose build --no-cache && docker compose up -d
#
# Test der UI nach Start: http://localhost:9876
#
# Daten liegen im Named-Volume "opncockpit-data". Per Default ueberlebt das
# `docker compose down`. Mit `docker compose down -v` waere es geloescht.

services:
  opn-cockpit:
    build: .
    image: opn-cockpit:local
    container_name: opn-cockpit
    restart: unless-stopped
    ports:
      - "9876:9876"
    volumes:
      - opncockpit-data:/data
    environment:
      TZ: Europe/Berlin
      # Multi-User-Server ist der Default fuer Container-Deployments.
      # Beim ersten Aufruf legt der Setup-Wizard automatisch einen leeren
      # Tresor unter OPNCOCKPIT_VAULT_PATH an, falls noch keiner da ist.
      OPNCOCKPIT_AUTH_BACKEND: "user-db"
      OPNCOCKPIT_DEPLOYMENT_MODE: "multi-server"
      OPNCOCKPIT_VAULT_PATH: "/data/firewalls.opnvault"
      # SQLite-Storage fuer Audit/Plans/Profiles — Single-File-Backup.
      OPNCOCKPIT_STORAGE_BACKEND: "sqlite"
      # Wenn du stattdessen Single-User-Mode willst: diese drei Werte
      # auskommentieren und nichts setzen. Dann erscheint der klassische
      # Vault-Picker.
      #
      # Weitere Tunables:
      # OPNCOCKPIT_PORT: "9876"
      # OPNCOCKPIT_NO_BROWSER: "1"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9876/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  opncockpit-data:
    name: opncockpit-data
